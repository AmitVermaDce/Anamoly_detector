# ==============================================================================
# config.yaml — Anomaly Detection Pipeline Configuration
# ==============================================================================

# ---- Azure Key Vault ----
key_vault:
  name: "your-keyvault-name"
  managed_identity_client_id: "your-managed-identity-client-id"

# ---- Snowflake Connection ----
snowflake:
  database: "CDW_PRD_CALL_DB"
  warehouse: ""       # set to your real warehouse name
  schema: "CDW_COVE_RPT_SC"
  role: ""            # loaded from Key Vault if blank

# ---- Paths (relative to project root) ----
paths:
  queries_dir: "queries"
  artifacts_dir: "artifacts"

# Optional CSV fallback for dev/testing (comment out or remove to use Snowflake)
# local_csv: "data/issues.csv"

# ---- SQL Query File ----
query_file: "query.sql"

# ---- Artifact filenames per query (configurable in one place) ----
query_artifacts:
  by_client: "by_client.csv"
  by_category: "by_category.csv"
  by_subcategory: "by_subcategory.csv"
  by_client_category: "by_client_category.csv"

# ---- Detection Levels ----
# Each level defines which columns to group by when aggregating the base data.
detection_levels:
  by_client:
    group_cols: ["CLIENT_NAME"]

  by_category:
    group_cols: ["ISSUE_CATEGORY"]

  by_subcategory:
    group_cols: ["ISSUE_SUBCATEGORY"]

  by_client_category:
    group_cols: ["CLIENT_NAME", "ISSUE_CATEGORY"]

# ---- Anomaly Detection Parameters ----
detection_params:
  rolling_window: 30
  zscore_threshold: 3.0
  iqr_multiplier: 1.5
  std_band_multiplier: 2.5
  min_data_points: 30
  consensus_threshold: 2
  recent_days: 30
  plot_top_n: 5
